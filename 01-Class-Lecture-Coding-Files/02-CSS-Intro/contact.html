    <h1>Contact Us Page</h1>

    <form action="" method="GET">
      <input type="text" placeholder="First Name" name="fName" /> <br /><br />
      <input type="text" placeholder="Last Name" name="lName" /> <br /><br />

      <input type="email" placeholder="Email" name="email" /> <br /><br />
      <input
        type="password"
        placeholder="password"
        name="password"
      /><br /><br />

      <p>Gender</p>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">Male</label> <br /><br />
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label> <br /><br />

      <p>Degree</p>

      <select name="degree" id="">
        <option value="bscs">BSCS</option>
        <option value="bsds">BSCDS</option>
        <option value="bssecurity">BSCSecurity</option>
      </select>

      <button>Register</button>
    </form>

    <h1>Hijack Youtube</h1>
